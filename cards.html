<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media query.css">
    <link rel="shortcut icon" href="web logo/wmremove-transformed.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Demon Slayer | Kimetsu No Yaiba - Character Gallery</title>
</head>

<body>
    <div class="other-loader">
        <div class="other-loader-content section-height"></div>
    </div>
    <div class="page-transition-grid section-height">
        <div class="transition-grid-content"></div>
    </div>
    <div class="grid-box-section"></div>
    <div class="navbar">
        <div class="nav-content">
            <div class="mobile-view-content">
                <h3>demon slayer</h3>
                <h3 class="menu">menu</h3>
            </div>
            <div class="nav-social-links">
                <div class="links">
                    <li><a href="#">index</a></li>
                    <li><a href="#">corp</a></li>
                    <li><a href="#">combat</a></li>
                    <li><a href="#">card</a></li>
                </div>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="card-showcase-section">
            <div class="card-showcase-top card-except-middle padding-inline">
                <h2>arc / journey</h2>
                <h2 class="character-name">character</h2>
            </div>
            <div class="card-showcase">
                <div class="character-cards">
                </div>
            </div>
            <div class="card-showcase-bottom card-except-middle padding-inline">
                <h2>character path linked</h2>
                <h2>journey sequence active</h2>
            </div>
        </div>
        <div class="card-play-circle">
            <div class="move-back move-btn">
                <i class="ri-arrow-left-double-line"></i>
            </div>
            <div class="play">play</div>
            <div class="move-front move-btn">
                <i class="ri-arrow-right-double-line"></i>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
        integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>

</body>

</html>
